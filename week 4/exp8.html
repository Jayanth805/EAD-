<!DOCTYPE html>
<html lang="en">
<head>
    <title>Experiment 8 - Calculator UI</title>
    <link rel="stylesheet" href="exp8.css">
</head>
<body>

<h1>Calculator UI</h1>

<div class="calculator">
    <div class="display">0</div>

    <div class="buttons">
        <button class="operator">C</button>
        <button class="operator">÷</button>
        <button class="operator">×</button>
        <button class="operator">−</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="equal">=</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
    </div>
</div>

</body>
</html>
