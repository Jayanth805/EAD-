<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Employee Salary Calculator</h2>

    <input type="text" id="name" placeholder="Enter Employee Name">
    <input type="number" id="salary" placeholder="Enter Basic Salary">

    <button onclick="calculateSalary()">Calculate</button>

    <div class="result" id="result"></div>
</div>

<script>

function Employee(name, basicSalary, hra = 2000, ta = 1000) {
    this.name = name;
    this.basicSalary = basicSalary;
    this.hra = hra;
    this.ta = ta;

    this.calculateNetSalary = function() {
        var gross = this.basicSalary + this.hra + this.ta;
        var tax = gross * 0.10;
        var net = gross - tax;

        return {
            grossSalary: gross,
            taxAmount: tax,
            netSalary: net
        };
    };
}

function calculateSalary() {
    var name = document.getElementById("name").value;
    var salary = parseFloat(document.getElementById("salary").value);
    var resultDiv = document.getElementById("result");

    if (name === "" || isNaN(salary)) {
        resultDiv.innerHTML = "Please enter valid details!";
        return;
    }

    var emp = new Employee(name, salary);
    var salaryDetails = emp.calculateNetSalary();

    resultDiv.innerHTML =
        "<p><b>Name:</b> " + emp.name + "</p>" +
        "<p><b>Gross Salary:</b> " + salaryDetails.grossSalary + "</p>" +
        "<p><b>Tax (10%):</b> " + salaryDetails.taxAmount + "</p>" +
        "<p><b>Net Salary:</b> " + salaryDetails.netSalary + "</p>";
}

</script>

</body>
</html>
