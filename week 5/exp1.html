<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
        }

        .box {
            background: white;
            padding: 20px;
            width: 250px;
            text-align: center;
            border: 1px solid #ccc;
        }

        input {
            width: 100%;
            padding: 5px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 6px;
            background: green;
            color: white;
            border: none;
        }

        button:disabled {
            background: gray;
        }

        .msg {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="msg" id="message"></p>
</div>

<script>
    function counter() {
        let count = 0;
        return function() {
            count++;
            return count;
        }
    }

    const track = counter();

    function login() {
        let username = document.getElementById("user").value;
        let password = document.getElementById("pass").value;
        let msg = document.getElementById("message");
        let btn = document.querySelector("button");

        if (username === "") {
            msg.innerHTML = "Username required!";
            return;
        }

        if (password.length < 6) {
            msg.innerHTML = "Password must be 6 characters!";
            return;
        }

        if (username !== "admin" || password !== "123456") {
            let attempt = track();
            msg.innerHTML = "Wrong login! Attempt " + attempt + " of 3";

            if (attempt >= 3) {
                btn.disabled = true;
                msg.innerHTML = "Login disabled after 3 attempts!";
            }
        } else {
            msg.style.color = "green";
            msg.innerHTML = "Login Successful!";
        }
    }
</script>

</body>
</html>
