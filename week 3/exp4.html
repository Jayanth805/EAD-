<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
        }
        nav{
            background-color: #333;
        }
        ul{
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        li{
            padding: 15px 25px;
        }
        a{
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        li:hover{
            background-color: #555;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>
