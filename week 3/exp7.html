<!DOCTYPE html>
<html>
<head>
    <title>Basic Webpage Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            height: 400px;
        }

        .sidebar {
            width: 25%;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .main {
            width: 75%;
            background-color: #ddd;
            padding: 20px;
        }

        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="header">Header</div>

    <div class="container">
        <div class="sidebar">Sidebar</div>
        <div class="main">Main Content</div>
    </div>

    <div class="footer">Footer</div>

</body>
</html>
