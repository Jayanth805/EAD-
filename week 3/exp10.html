<!DOCTYPE html>
<html>
<head>
    <title>My College Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: #34495e;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        .content {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .box {
            flex: 1;
            padding: 20px;
            background-color: #ecf0f1;
            border: 1px solid #ccc;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .content {
                flex-direction: column;
            }

            nav {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h2>MY College</h2>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>

    <div class="content">
        <div class="box">
            <h3>About College</h3>
            <p>Welcome to MY College. We provide quality education.</p>
        </div>
        <div class="box">
            <h3>Our Courses</h3>
            <p>B.Tech, MBA, B.Sc, B.Com and more.</p>
        </div>
    </div>

    <footer>
        Footer of my college
    </footer>

</body>
</html>
